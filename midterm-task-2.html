<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Midterm Task 2. Data Analysis using Pivot Table</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background:
                radial-gradient(circle at 18% 18%, rgba(168, 85, 247, 0.42), transparent 42%),
                radial-gradient(circle at 82% 14%, rgba(56, 189, 248, 0.34), transparent 38%),
                radial-gradient(circle at 50% 82%, rgba(244, 114, 182, 0.28), transparent 45%),
                radial-gradient(circle at 70% 60%, rgba(129, 140, 248, 0.20), transparent 42%),
                #02030c;
            min-height: 100vh;
            padding: 10px;
            position: relative;
            overflow-x: hidden;
            animation: nebulaShift 18s ease-in-out infinite;
        }

        body::before,
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        body::before {
            background-image:
                radial-gradient(1px 1px at 20px 30px, rgba(255, 255, 255, 0.8), transparent),
                radial-gradient(2px 2px at 120px 80px, rgba(255, 255, 255, 0.85), transparent),
                radial-gradient(1px 1px at 220px 150px, rgba(167, 139, 250, 0.9), transparent),
                radial-gradient(2px 2px at 340px 240px, rgba(103, 232, 249, 0.8), transparent),
                radial-gradient(1px 1px at 500px 120px, rgba(255, 255, 255, 0.6), transparent),
                radial-gradient(2px 2px at 700px 280px, rgba(167, 139, 250, 0.65), transparent);
            background-size: 420px 320px, 420px 320px, 420px 320px, 420px 320px, 760px 460px, 920px 580px;
            animation: twinkle 7s linear infinite, starDrift 40s linear infinite;
            opacity: 0.95;
        }

        body::after {
            background:
                radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.09), transparent 55%),
                conic-gradient(from 0deg at 50% 50%, rgba(34, 211, 238, 0.08), rgba(168, 85, 247, 0.08), rgba(236, 72, 153, 0.08), rgba(34, 211, 238, 0.08));
            mix-blend-mode: screen;
            animation: pulseGalaxy 6s ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        @keyframes pulseGalaxy {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.05); }
        }

        @keyframes starDrift {
            0% { transform: translateX(0) translateY(0); }
            100% { transform: translateX(-220px) translateY(-120px); }
        }

        @keyframes nebulaShift {
            0%, 100% { filter: saturate(1) hue-rotate(0deg); }
            50% { filter: saturate(1.15) hue-rotate(8deg); }
        }

        .container {
            background: rgba(15, 20, 45, 0.7);
            backdrop-filter: blur(10px);
            border: 2px solid;
            border-image: linear-gradient(135deg, #00d4ff, #7928ca, #00d4ff) 1;
            border-radius: 0;
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.3), inset 0 0 40px rgba(121, 40, 202, 0.1);
            max-width: 1500px;
            width: 100%;
            margin: 0 auto;
            overflow: hidden;
            position: relative;
            z-index: 1;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, transparent 30%, rgba(0, 212, 255, 0.03) 50%, transparent 70%);
            pointer-events: none;
            animation: scan 8s linear infinite;
        }

        .container::after {
            content: '';
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(circle at 50% -15%, rgba(103, 232, 249, 0.12), transparent 55%);
        }

        @keyframes scan {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        .header {
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.1), rgba(121, 40, 202, 0.1));
            padding: 44px 40px 34px;
            text-align: center;
            color: #00d4ff;
            border-bottom: 1px solid rgba(0, 212, 255, 0.3);
            position: relative;
            z-index: 1;
        }

        .header h1 {
            font-size: 34px;
            margin-bottom: 8px;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.8);
            letter-spacing: 2px;
            font-weight: bold;
        }

        .header p {
            color: #b0bec5;
            letter-spacing: 1px;
        }

        .content {
            padding: 40px 56px 56px;
            position: relative;
            z-index: 1;
        }

        .back-link {
            display: inline-block;
            background: rgba(0, 212, 255, 0.1);
            color: #00d4ff;
            padding: 10px 16px;
            border-radius: 0;
            text-decoration: none;
            border: 2px solid #00d4ff;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
            letter-spacing: 1px;
            transition: all 0.3s ease;
            font-size: 13px;
            margin-bottom: 20px;
        }

        .back-link:hover {
            background: #00d4ff;
            color: #0a0e27;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.8);
        }

        .section h2 {
            color: #00d4ff;
            font-size: 24px;
            margin-bottom: 18px;
            border-bottom: 2px solid #7928ca;
            padding-bottom: 10px;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
            letter-spacing: 1px;
        }

        .description {
            background: rgba(0, 212, 255, 0.03);
            border: 2px solid #7928ca;
            border-radius: 0;
            box-shadow: 0 0 15px rgba(121, 40, 202, 0.2);
            padding: 20px;
            margin-bottom: 20px;
        }

        .description p {
            margin: 0;
            color: #b0bec5;
            line-height: 1.8;
            font-size: 15px;
        }

        @media (max-width: 768px) {
            .header {
                padding: 34px 20px 26px;
            }

            .header h1 {
                font-size: 26px;
            }

            .content {
                padding: 24px 20px 28px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>MIDTERM TASK 2</h1>
            <p>DATA ANALYSIS USING PIVOT TABLE</p>
        </header>

        <main class="content">
            <a class="back-link" href="index.html">BACK TO PORTFOLIO</a>

            <section class="section">
                <h2>PROJECT DESCRIPTION</h2>
                <div class="description">
                    <p>None</p>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
